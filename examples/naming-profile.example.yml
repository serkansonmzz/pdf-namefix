language: english
pattern: "{title}_{type}"
max_length: 120
date_fallback: "none"
include_unknown_date_prefix: false
include_type_suffix: true
preserve_author_for_books: true
skip_if_confidence_below: 0.70
low_confidence_threshold: 0.70
ai_mode: practical
allow_known_work_inference: true

folders:
  book: books
  ebook: books
  reference: reference
  language_learning: language-learning
  study_material: study-materials
  course: courses
  worksheet: worksheets
  article: articles
  paper: papers
  report: reports
  payment: payments
  invoice: invoices
  exam: exams
  document: documents
  unknown: needs-review

rules:
  - Use lowercase snake_case filenames.
  - Keep filenames short but descriptive.
  - Do not invent dates.
  - Do not add unknown-date unless explicitly configured.
  - Preserve author names for books when useful.
  - Preserve .pdf extension.
  - Prefer specific document types over generic document.
